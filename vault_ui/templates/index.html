<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #666;
      --accent: #c8ff00;
      --accent-dim: #c8ff0022;
      --danger: #ff4444;
      --font-mono: 'Geist Mono', monospace;
      --font-serif: 'Instrument Serif', serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: var(--font-serif);
      font-size: 1.8rem;
      font-style: italic;
      color: var(--accent);
      letter-spacing: -0.02em;
    }

    .status-pill {
      font-size: 0.7rem;
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .status-pill.ok { border-color: var(--accent); color: var(--accent); }
    .status-pill.err { border-color: var(--danger); color: var(--danger); }

    main {
      flex: 1;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      padding: 3rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .search-box {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .search-box:focus-within { border-color: var(--accent); }

    #question {
      flex: 1;
      background: var(--surface);
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.9rem;
      padding: 1rem 1.2rem;
    }

    #question::placeholder { color: var(--muted); }

    #search-btn {
      background: var(--accent);
      color: #000;
      border: none;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0 1.5rem;
      transition: opacity 0.2s;
    }

    #search-btn:hover { opacity: 0.85; }
    #search-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .answer-block {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .answer-block.visible { display: block; }

    .answer-header {
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    #answer-text {
      padding: 1.2rem;
      font-family: var(--font-mono);
      font-size: 0.88rem;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
      min-height: 60px;
    }

    .sources {
      padding: 0.7rem 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--muted);
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .source-tag {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 3px;
      padding: 0.15rem 0.5rem;
      font-size: 0.7rem;
    }

    .index-section {
      border: 1px dashed var(--border);
      border-radius: 4px;
      padding: 1.2rem;
    }

    .index-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.7rem;
    }

    .index-row {
      display: flex;
      gap: 0.5rem;
    }

    #folder-path {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.82rem;
      padding: 0.5rem 0.8rem;
      outline: none;
    }

    #folder-path:focus { border-color: var(--accent); }

    #index-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
      border-radius: 3px;
      transition: border-color 0.2s, color 0.2s;
    }

    #index-btn:hover { border-color: var(--accent); color: var(--accent); }

    #index-status { margin-top: 0.7rem; font-size: 0.78rem; color: var(--muted); }

    .cursor-blink {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  </style>
</head>
<body>
  <header>
    <div class="logo">vault</div>
    <div class="status-pill" id="status-pill">checking...</div>
  </header>

  <main>
    <div class="search-box">
      <input id="question" type="text" placeholder="ask anything about your files..." autocomplete="off" />
      <button id="search-btn">search</button>
    </div>

    <div class="answer-block" id="answer-block">
      <div class="answer-header">answer</div>
      <div id="answer-text"></div>
      <div class="sources" id="sources"></div>
    </div>

    <div class="index-section">
      <div class="index-label">index a folder</div>
      <div class="index-row">
        <input id="folder-path" type="text" placeholder="/Users/you/Documents/notes" />
        <button id="index-btn">index</button>
      </div>
      <div id="index-status"></div>
    </div>
  </main>

  <script>
    const pill = document.getElementById('status-pill');
    const answerBlock = document.getElementById('answer-block');
    const answerText = document.getElementById('answer-text');
    const sourcesDiv = document.getElementById('sources');
    const searchBtn = document.getElementById('search-btn');
    const questionInput = document.getElementById('question');

    // Status check
    async function checkStatus() {
      try {
        const r = await fetch('/api/status');
        const d = await r.json();
        if (d.ollama) {
          pill.textContent = `ollama ✓  ${d.chunks} chunks`;
          pill.className = 'status-pill ok';
        } else {
          pill.textContent = 'ollama offline';
          pill.className = 'status-pill err';
        }
      } catch { pill.textContent = 'error'; pill.className = 'status-pill err'; }
    }
    checkStatus();

    // Search with streaming
    questionInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
    searchBtn.addEventListener('click', doSearch);

    async function doSearch() {
      const q = questionInput.value.trim();
      if (!q) return;

      searchBtn.disabled = true;
      answerText.innerHTML = '<span class="cursor-blink"></span>';
      answerBlock.classList.add('visible');
      sourcesDiv.innerHTML = '';

      const evtSource = new EventSource(`/api/search/stream?q=${encodeURIComponent(q)}`);
      let fullText = '';

      evtSource.onmessage = e => {
        if (e.data === '[DONE]') {
          evtSource.close();
          searchBtn.disabled = false;
          answerText.textContent = fullText;
          checkStatus();
          return;
        }
        fullText += e.data;
        answerText.innerHTML = fullText + '<span class="cursor-blink"></span>';
      };

      evtSource.onerror = () => {
        evtSource.close();
        searchBtn.disabled = false;
        if (!fullText) answerText.textContent = '❌ Search failed. Is Ollama running?';
      };
    }

    // Index folder
    document.getElementById('index-btn').addEventListener('click', async () => {
      const path = document.getElementById('folder-path').value.trim();
      if (!path) return;
      const status = document.getElementById('index-status');
      status.textContent = '⏳ Indexing...';
      try {
        const r = await fetch('/api/index', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path }),
        });
        const d = await r.json();
        if (d.error) { status.textContent = `❌ ${d.error}`; return; }
        status.textContent = `✅ ${d.files_indexed} files, ${d.chunks_total} chunks indexed`;
        checkStatus();
      } catch { status.textContent = '❌ Failed to index'; }
    });
  </script>
</body>
</html>
